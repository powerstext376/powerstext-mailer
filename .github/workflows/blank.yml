name: Powerstext Daily Mailer

on:
  schedule:
    # Yeh timer roz subah 10:00 AM IST ke liye set hai (4:30 AM UTC)
    - cron: '30 4 * * *'
  workflow_dispatch: # Yeh hume manual 'Run' button dega testing ke liye

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Get Files from Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Google Sheets & Email Libraries
      run: |
        python -m pip install --upgrade pip
        pip install gspread oauth2client

    - name: Run Main Engine
      run: python main.py
