name: Powerstext Mailer

on:
  workflow_dispatch:

# 🚨 YEH HAI WOH MAGIC LOCK 🚨
concurrency: 
  group: powerstext-lock
  cancel-in-progress: false

jobs:
  run-mailer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client pytz

      - name: Run Main Engine
        run: python main.py
        
